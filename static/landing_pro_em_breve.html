<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AurumSci PRO — Em breve</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:linear-gradient(135deg,#0A0A0F 0%,#15151F 100%);
    color:#fff; min-height:100vh; display:flex; align-items:center;
    justify-content:center; text-align:center; padding:24px;
  }
  .box { max-width:480px; }
  .logo {
    font-size:42px; font-weight:900; letter-spacing:2px;
    background:linear-gradient(135deg,#C9A84C,#E8D08A);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; margin-bottom:8px;
  }
  .pro { font-size:18px; color:#C9A84C; letter-spacing:6px; margin-bottom:32px; }
  .titulo { font-size:26px; font-weight:700; margin-bottom:16px; line-height:1.3; }
  .texto { font-size:16px; color:#9A9AA5; line-height:1.6; margin-bottom:32px; }
  .emoji { font-size:48px; margin-bottom:24px; }
  .selo {
    display:inline-block; padding:10px 24px;
    border:1px solid rgba(201,168,76,.4); border-radius:30px;
    color:#C9A84C; font-size:13px; letter-spacing:1px; font-weight:600;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="emoji">💪</div>
    <div class="logo">AURUMSCI</div>
    <div class="pro">PRO</div>
    <div class="titulo">Estamos aprimorando a plataforma</div>
    <div class="texto">Em breve, o AurumSci PRO chega pra transformar a gestão do seu trabalho como personal trainer. Estamos deixando tudo redondo pra te entregar a melhor experiência.</div>
    <div class="selo">🔒 EM BREVE</div>
  </div>
</body>
</html>
